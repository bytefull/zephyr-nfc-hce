manifest:

  defaults:
    remote: zephyrproject

  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos

    - name: bytefull
      url-base: https://github.com/bytefull

  projects:
    - name: zephyr
      repo-path: zephyr
      revision: v4.3.0
      path: zephyr
      import:
        path-prefix: dependencies
        name-allowlist:
          - cmsis_6
          - hal_stm32

    - name: pn532
      remote: bytefull
      revision: main
      repo-path: pn532
      path: dependencies/modules/pn532
      import: true

  self:
    path: application