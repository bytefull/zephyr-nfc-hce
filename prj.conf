# Logging
CONFIG_LOG=y
CONFIG_LOG_INFO_COLOR_GREEN=y
CONFIG_LOG_DBG_COLOR_BLUE=y
CONFIG_LOG_OUTPUT_FORMAT_TIME_TIMESTAMP=y
CONFIG_LOG_OUTPUT_FORMAT_DATE_TIMESTAMP=y

# UART
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Shell
CONFIG_SHELL=n
CONFIG_KERNEL_SHELL=n

# Debugging
CONFIG_DEBUG=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_NO_OPTIMIZATIONS=y
CONFIG_SIZE_OPTIMIZATIONS=n
CONFIG_THREAD_STACK_INFO=y
CONFIG_COMPILER_WARNINGS_AS_ERRORS=y
CONFIG_INIT_STACKS=y
CONFIG_STACK_USAGE=y
CONFIG_EARLY_CONSOLE=y

# Stack Sizes
CONFIG_MAIN_STACK_SIZE=2048
# CONFIG_SHELL_STACK_SIZE=2048
# CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
# CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096
